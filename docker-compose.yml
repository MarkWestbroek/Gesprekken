services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9011:9001"   # Web console (host 9011 om conflict te vermijden)
    volumes:
      - miniodata:/data

volumes:
  miniodata:
